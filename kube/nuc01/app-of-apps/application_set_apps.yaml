---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: argocd
            repoURL: https://argoproj.github.io/argo-helm
            chart: argo-cd
            targetRevision: 9.7.1
            namespace: argocd
          - name: metallb
            repoURL: https://metallb.github.io/metallb
            chart: metallb
            targetRevision: 0.16.1
            namespace: default
          - name: traefik-internal
            repoURL: https://traefik.github.io/charts
            chart: traefik
            targetRevision: 41.0.2
            namespace: traefik-internal
          - name: traefik-public
            repoURL: https://traefik.github.io/charts
            chart: traefik
            targetRevision: 41.0.2
            namespace: traefik-public
            helm_skip_crds: true
          - name: external-dns
            repoURL: https://kubernetes-sigs.github.io/external-dns/
            chart: external-dns
            targetRevision: 1.21.1
            namespace: external-dns
          - name: cert-manager
            repoURL: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: v1.21.0
            namespace: cert-manager
          - name: cloudnativepg
            repoURL: https://cloudnative-pg.github.io/charts
            chart: cloudnative-pg
            targetRevision: 0.29.0
            namespace: cnpg-system
          - name: redis-operator
            repoURL: https://ot-container-kit.github.io/helm-charts/
            chart: redis-operator
            targetRevision: 0.25.0
            namespace: ov
          - name: temporal
            repoURL: https://go.temporal.io/helm-charts
            chart: temporal
            targetRevision: 1.6.0
            namespace: temporal
          - name: kube-prometheus-stack
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: 87.19.1
            namespace: monitoring
          - name: opentelemetry-collector
            repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
            chart: opentelemetry-collector
            targetRevision: 0.165.0
            namespace: monitoring
          - name: tempo
            repoURL: https://grafana.github.io/helm-charts
            chart: tempo
            targetRevision: 1.24.4
            namespace: monitoring
          - name: loki
            repoURL: https://grafana.github.io/helm-charts
            chart: loki
            targetRevision: 6.55.0
            namespace: monitoring
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: default
      destination:
        namespace: "{{ .namespace }}"
        server: https://kubernetes.default.svc
      sources:
        - repoURL: "{{ .repoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            valueFiles:
              - "$values/kube/nuc01/{{ .name }}/values.yaml"
        - repoURL: https://github.com/Charg/home.git
          targetRevision: main
          ref: values
  templatePatch: |
    spec:
      sources:
        - repoURL: "{{ .repoURL }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            skipCrds: {{ dig "helm_skip_crds" "false" . }}
            valueFiles:
              - "$values/kube/nuc01/{{ .name }}/values.yaml"
        - repoURL: https://github.com/Charg/home.git
          targetRevision: main
          ref: values
      syncPolicy:
        automated:
          enabled: {{ dig "auto_sync" "true" . }}
          prune: {{ dig "prune" "true" . }}
          selfHeal: {{ dig "selfHeal" "true" . }}
        syncOptions:
          - CreateNamespace={{ dig "createNamespace" "true" . }}
          - ServerSideApply={{ dig "serverSideApply" "true" . }}
