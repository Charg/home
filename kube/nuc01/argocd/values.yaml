# https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

global:
  domain: argo-nuc01.packet.fail
configs:
  params:
    server.insecure: true
  repositories:
    home-repo:
      url: https://github.com/Charg/home.git
  cmp:
    create: true
    plugins:
      sops:
        generate:
          command: [sh, -c]
          args:
            - |
                set -euo pipefail

                first=true
                for f in $(find . -maxdepth 1 -type f \( -name "*.yaml" -o -name "*.yml" \) | sort); do
                  # Print YAML separator if not the first document
                  if [ "$first" = false ]; then
                    echo "---"
                  fi

                  if echo "$f" | grep -qE "\.enc\.ya?ml$"; then
                    if ! sops --decrypt "$f"; then
                      echo "Error: Failed to decrypt $f" >&2
                      exit 1
                    fi
                  else
                    cat "$f"
                  fi
                  first=false
                done
        discover:
          find:
            glob: "**/*.enc.yaml"
repoServer:
  initContainers:
    - name: download-sops
      image: alpine:latest
      command: [sh, -c]
      args:
        - |
          set -e
          SOPS_VERSION=v3.9.4
          ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          wget -qO /custom-tools/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.${ARCH}"
          chmod +x /custom-tools/sops
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  extraContainers:
    - name: sops-cmp
      command: [/var/run/argocd/argocd-cmp-server]
      image: quay.io/argoproj/argocd:v3.3.6
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      env:
        - name: SOPS_AGE_KEY_FILE
          value: /sops/age/key.txt
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: sops.yaml
          name: argocd-cmp-cm
        - mountPath: /tmp
          name: cmp-tmp
        - mountPath: /usr/local/bin/sops
          name: custom-tools
          subPath: sops
        - mountPath: /sops/age
          name: sops-age-key
          readOnly: true
  volumes:
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
    - name: custom-tools
      emptyDir: {}
    - name: cmp-tmp
      emptyDir: {}
    - name: sops-age-key
      secret:
        secretName: sops-age-key
server:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: lets-encrypt-packet-fail
      external-dns.alpha.kubernetes.io/hostname: argo-nuc01.packet.fail
    ingressClassName: traefik-internal
    tls: true
