---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: ac-postgres-pooler
spec:
  cluster:
    name: ac-postgres
  instances: 1
  type: rw
  monitoring:
    enablePodMonitor: true
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "20"
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
