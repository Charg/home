---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ov-postgres
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  instances: 1

  bootstrap:
    initdb:
      owner: veto
      secret:
        name: postgres-credentials

  storage:
    size: 100Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
