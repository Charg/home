# source: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik-public

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

providers:
  kubernetesCRD:
    enabled: true
    ingressClass: traefik-public
  kubernetesIngress:
    enabled: true
    ingressClass: traefik-public
