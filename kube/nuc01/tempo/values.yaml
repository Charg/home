# source: https://github.com/grafana/helm-charts/blob/main/charts/tempo/values.yaml

global:
  # keep ballast well under the memory limit (~25%) so GC pacing benefits don't
  # eat the headroom needed for compaction/flush spikes - chart default of 1024Mi
  # exceeded the old 512Mi limit outright, pinning the container at its ceiling
  # and causing GC stalls that timed out the /ready liveness probe (exit 137).
  memBallastSizeMbs: 256

tempo:
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: 300m
      memory: 1.5Gi
  retention: 48h
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    processor:
      service_graphs:
        wait: 10s
        max_items: 10000
      span_metrics:
        enable_target_info: true
      local_blocks:
        flush_to_storage: true
        filter_server_spans: false

persistence:
  enabled: true
  storageClassName: local-path
  size: 5Gi

tempoQuery:
  enabled: false
